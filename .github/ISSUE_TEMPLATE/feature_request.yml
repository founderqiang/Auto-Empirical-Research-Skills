name: Feature request
description: Propose an improvement to AERS — a new rigor check, tooling, docs, or workflow idea (for new skill collections use the skill submission template instead).
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AERS! For **new skill collections**, please use the
        *Skill submission* template instead. This template is for everything else:
        rigor coverage (eval scenarios / benchmark tasks), catalog & tooling,
        documentation, CI, or workflow ideas.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rigor — eval scenario (methodological pitfall check)
        - Rigor — benchmark task (numeric recovery check)
        - Catalog / taxonomy / search
        - First-party skills (StatsPAI, 00.x pipelines, Paper-WorkFlow)
        - Docs / guides / translations
        - CI / validation / release tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is missing or could be better?
      description: Describe the gap. For rigor requests, name the method family and the specific trap a careless pipeline falls into.
      placeholder: "e.g. There is no benchmark task for shift-share (Bartik) instruments; a pipeline that ignores exposure-share clustering still passes."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would done look like? For benchmark tasks, a deterministic construction with a known truth is the house style.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Papers, packages, or existing repos that ground the request (optional).
  - type: checkboxes
    id: checks
    attributes:
      label: Scope checks
      options:
        - label: This is not a request to add paid/proprietary-core material (repo scope rule).
          required: true
        - label: I searched existing issues and docs/ROADMAP.md for duplicates.
          required: true
