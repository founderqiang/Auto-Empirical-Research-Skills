name: Usage question
description: How do I install, call, or debug AERS skills?
title: "[Q]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: Brief description of the research task or skill you want to use.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Commands run, errors, links to relevant docs.
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, IDE (Claude Code / Codex / etc.).
    validations:
      required: false