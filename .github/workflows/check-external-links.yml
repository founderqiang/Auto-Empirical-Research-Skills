name: Check external links

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check maintained-doc external links
        id: check
        run: |
          set +e
          make external-links
          rc=$?
          set -e
          echo "exit=$rc" >> "$GITHUB_OUTPUT"

      - name: Build triage note and open / update tracking issue
        if: steps.check.outputs.exit != '0'
        run: |
          python3 scripts/build-link-triage.py --out docs/LINK_TRIAGE.md
          body=$(python3 - <<'PY'
          import os, json
          from pathlib import Path
          ROOT = Path(".").resolve()
          triage = (ROOT / "docs" / "LINK_TRIAGE.md").read_text()
          ext = json.loads((ROOT / "catalog" / "external-link-check.json").read_text())
          n = len(ext.get("failures", []))
          print(f"_Auto-generated by the failing link-check workflow run ${{ github.run_id }}.\n\n")
          print(triage)
          PY
          )
          echo "TRIAGE_BODY<<EOF" > /tmp/triage_body.txt
          echo "$body" >> /tmp/triage_body.txt
          echo "EOF" >> /tmp/triage_body.txt

      - name: Upload triage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-link-triage
          path: docs/LINK_TRIAGE.md

      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-link-check
          path: catalog/external-link-check.json

  triage-issue:
    if: failure()
    needs: links
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open link-triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[link-triage] External link check failed (${new Date().toISOString().slice(0,10)})`;
            const body = require('fs').readFileSync('docs/LINK_TRIAGE.md', 'utf8');
            // De-dupe: search for an open issue with the same title marker.
            const marker = '[link-triage] External link check failed';
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 20
            });
            const existing = data.find(i => i.title.startsWith(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body: body
              });
              core.info(`updated existing triage issue #${existing.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['link-triage']
              });
              core.info(`opened new triage issue #${issue.data.number}`);
            }
