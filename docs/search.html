<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AERS Skill Search</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4; --panel: #ffffff; --ink: #1f2933; --muted: #5f6b7a;
      --line: #d8d8d0; --accent: #0f766e; --warn: #9a3412; --good: #15803d;
      --chip: #eef2f1; --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111312; --panel: #181b1a; --ink: #edf2f0; --muted: #aab6b1;
        --line: #343a38; --accent: #5eead4; --warn: #fdba74; --good: #86efac;
        --chip: #20302c;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
    header, main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 28px 0 18px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 6px; font-size: clamp(26px, 5vw, 42px); line-height: 1.05; }
    p { margin: 0; color: var(--muted); }
    .controls { display: grid; grid-template-columns: minmax(220px, 2fr) repeat(5, 1fr); gap: 10px; margin: 18px 0 10px; }
    input, select { width: 100%; min-height: 40px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); color: var(--ink); padding: 0 12px; font: inherit; }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin: 6px 0 16px; color: var(--muted); }
    .stat { border: 1px solid var(--line); border-radius: var(--radius); padding: 6px 10px; background: var(--panel); }
    .reset { cursor: pointer; }
    .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; padding-bottom: 36px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; }
    .card h2 { margin: 0 0 8px; font-size: 16px; line-height: 1.25; }
    .desc { color: var(--muted); font-size: 13.5px; flex: 1; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 4px; }
    .chip { border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; color: var(--muted); font-size: 12px; background: var(--chip); }
    .chip.tag { cursor: pointer; }
    .chip.tag:hover { border-color: var(--accent); color: var(--accent); }
    .chip.method { border-color: var(--accent); }
    .restricted { color: var(--warn); }
    .score { font-weight: 600; }
    .score.lo { color: var(--warn); }
    .score.hi { color: var(--good); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 860px) { .controls { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>AERS Skill Search</h1>
    <p><span id="skill-count">Search all cataloged</span> skills by text, method, workflow stage, language, license, and commercial-use status. Tags are inferred; click a tag to filter.</p>
    <p style="margin-top:8px">Looking for the software <em>tools</em> (libraries, MCP servers, research agents, datasets) instead? → <a href="tools-search.html">AERS Tools Search</a></p>
  </header>
  <main>
    <section class="controls" aria-label="Search controls">
      <input id="query" type="search" placeholder="Search DID, weak IV, abstract, de-AIGC, reghdfe…" autofocus>
      <select id="stage"><option value="">All stages</option></select>
      <select id="method"><option value="">All methods</option></select>
      <select id="language"><option value="">All languages</option></select>
      <select id="collection"><option value="">All collections</option></select>
      <select id="commercial"><option value="">All use terms</option></select>
    </section>
    <section id="stats" class="stats" aria-live="polite"></section>
    <section id="results" class="results"></section>
  </main>
  <script>
    const state = { skills: [] };
    const el = id => document.getElementById(id);
    const rel = path => "../" + path;
    const text = v => (v || "").toString();
    const tagsOf = (s, facet) => (s.tags && s.tags[facet]) || [];

    async function load() {
      const data = await fetch("../catalog/skills-enriched.json").then(r => r.json());
      state.skills = data.skills || [];
      el("skill-count").textContent = `Search ${state.skills.length.toLocaleString("en-US")}`;
      hydrate();
      render();
    }

    function unique(getter) {
      return [...new Set(state.skills.flatMap(getter).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function hydrate() {
      for (const v of unique(s => tagsOf(s, "stage"))) el("stage").append(new Option(v, v));
      for (const v of unique(s => tagsOf(s, "method"))) el("method").append(new Option(v, v));
      for (const v of unique(s => tagsOf(s, "language"))) el("language").append(new Option(v, v));
      for (const v of unique(s => [s.collection])) el("collection").append(new Option(v, v));
      for (const v of unique(s => [s.commercial_use])) el("commercial").append(new Option(v, v));
      for (const id of ["query", "stage", "method", "language", "collection", "commercial"]) {
        el(id).addEventListener("input", render);
      }
    }

    function matches(s) {
      const q = el("query").value.trim().toLowerCase();
      const facet = (id, key) => { const v = el(id).value; return !v || tagsOf(s, key).includes(v); };
      const haystack = [s.name, s.description_effective, s.path, s.collection,
        ...(tagsOf(s, "method")), ...(tagsOf(s, "stage")), ...(tagsOf(s, "language")), ...(tagsOf(s, "topic")),
        s.license].map(text).join(" ").toLowerCase();
      return (!q || haystack.includes(q))
        && facet("stage", "stage") && facet("method", "method") && facet("language", "language")
        && (!el("collection").value || s.collection === el("collection").value)
        && (!el("commercial").value || s.commercial_use === el("commercial").value);
    }

    function render() {
      const filtered = state.skills.filter(matches)
        .sort((a, b) => b.quality_score - a.quality_score || a.name.localeCompare(b.name));
      el("stats").innerHTML = [
        `${filtered.length} of ${state.skills.length} skills`,
        `${new Set(filtered.map(s => s.collection)).size} collections`,
        `<span class="reset" onclick="resetFilters()">↺ reset filters</span>`
      ].map(i => `<span class="stat">${i}</span>`).join("");
      el("results").innerHTML = filtered.slice(0, 300).map(card).join("");
    }

    function setFacet(facet, value) {
      const map = { method: "method", stage: "stage", language: "language" };
      if (map[facet]) { el(map[facet]).value = value; render(); }
    }
    window.setFacet = setFacet;
    window.resetFilters = () => {
      for (const id of ["query", "stage", "method", "language", "collection", "commercial"]) el(id).value = "";
      render();
    };

    function tagChips(s) {
      const chips = [];
      for (const m of tagsOf(s, "method")) chips.push(`<span class="chip tag method" onclick="setFacet('method','${m}')">${m}</span>`);
      for (const st of tagsOf(s, "stage")) chips.push(`<span class="chip tag" onclick="setFacet('stage','${st}')">${st}</span>`);
      for (const lg of tagsOf(s, "language")) chips.push(`<span class="chip tag" onclick="setFacet('language','${lg}')">${lg}</span>`);
      return chips.join("");
    }

    function card(s) {
      const restricted = s.commercial_use === "restricted" ? " restricted" : "";
      const source = s.source_url ? `<a href="${s.source_url}">source</a>` : "source unknown";
      const sclass = s.quality_score >= 90 ? "hi" : s.quality_score < 70 ? "lo" : "";
      const derived = s.description_source === "derived" ? " <em>(derived)</em>" : "";
      return `<article class="card">
        <h2><a href="${rel(s.path)}"><code>${esc(s.name)}</code></a></h2>
        <p class="desc">${esc(s.description_effective || "No description available.")}${derived}</p>
        <div class="meta">${tagChips(s)}</div>
        <div class="meta">
          <span class="chip">${esc(s.collection)}</span>
          <span class="chip">${s.line_count} lines</span>
          <span class="chip">${esc(s.license || "license unknown")}</span>
          <span class="chip${restricted}">${esc(s.commercial_use || "unknown")}</span>
          <span class="chip score ${sclass}">hygiene ${s.quality_score}</span>
          <span class="chip">${source}</span>
        </div>
      </article>`;
    }

    function esc(v) {
      return text(v).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    load().catch(err => {
      el("results").innerHTML = `<article class="card"><h2>Could not load catalog</h2><p>${esc(err.message)}. Serve the repo locally with <code>python3 -m http.server</code> (then open <code>docs/search.html</code>) or view via GitHub Pages — browsers block <code>file://</code> fetches.</p></article>`;
    });
  </script>
</body>
</html>
